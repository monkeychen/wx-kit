<meta property="og:title" content="先向佛得角致敬，但我婷这阵容实在是不行，除了梅老板以外，连个准超巨都找不出来，边路突破约等于零。\n\n只能说梅老板的球看一场是一场，放平心态吧。\n\n梅老板最新进球和罗总昨天那个头发丝越位进球有点像，但更难一些，对于球的落点和轨迹、球场空间、自身节奏三者的结合达到了前无古人的程度。\n\n老读者都知道，我年轻时是AC米兰、阿根廷、马拉多纳的死忠粉，要让我承认梅老板是GOAT，特别是承认梅老板已经超越巅峰老马是很难的，但当事实一遍遍呈现在眼前的时候，那我也只能实事求是了。\n\n梅老板这样的球员除了带来胜利以外，还能让很多人爱上足球，或者让像我这样的老球迷重新找回初恋的感觉。\n\n不止梅老板，目前老中青三代超巨都在世界杯上都有华丽的表演，包括佛得角门将在内的配角们也都是戏，收视率创新高。\n\n目前全球最有价值的职业联赛是NFL（美国橄榄球联盟），年营收230亿美元，每年约有1.5亿美国观众看转播。美国观众的特点就是舍得花钱，每年每人平均为了看转播花100多美元。\n\n但本届世界杯的美国收视率达到了和NFL差不多的水平，随着美国队的晋级，估计还能继续上升。\n\n钱当然也和水一样流过来，福克斯4亿多美元买的美国英语（还有西班牙语）转播权，预计收入能达到20多亿美元。\n\n未来华尔街肯定愿意投更多钱在MLS（美国职业足球联盟）上，只要钱够多，长期来看就能成为全球最有价值的足球联赛，美国国足也可能成为全球最强队之一。\n\n当然这都是10-20年之后的事，毕竟你钱再多，也不可能让现役球员变强，还是只能从青训做起。\n\n就这些了。" />
